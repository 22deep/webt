<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Free Fire Player Info</title>

<style>
body{
  background:#1e1e1e;
  font-family:Segoe UI;
  display:flex;
  justify-content:center;
  padding:30px;
}

.container{
  background:#2c2c2c;
  width:400px;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  color:#fff;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

label{
  color:#00c6ff;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:15px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,.3);
}

.result{
  margin-top:15px;
  padding:12px;
  border-radius:8px;
  background:#1a1a1a;
  display:none;
  white-space:pre-line;
}

.error{
  background:#3a1a1a;
  color:#ff6b6b;
}
</style>
</head>

<body>

<div class="container">
<h2>🔥 Free Fire Player Viewer</h2>

<label>🎮 Enter UID:</label>
<input type="text" id="uid" placeholder="Enter 8-13 digit UID">

<label>🌍 Select Region:</label>
<select id="region">
<option>Bangladesh</option>
<option>India</option>
<option>Brazil</option>
</select>

<button onclick="checkPlayer()">🔍 Check Player</button>

<div id="result" class="result"></div>
</div>

<script>
function checkPlayer(){

const uid=document.getElementById("uid").value.trim();
const result=document.getElementById("result");

result.className="result";
result.style.display="block";

if(!/^\d{8,13}$/.test(uid)){
result.classList.add("error");
result.innerHTML="❌ Invalid UID. Must be 8-13 digits.";
return;
}

// Demo fake data (Safe)
let randomLikes=Math.floor(Math.random()*100000);
let randomLevel=Math.floor(Math.random()*80);

result.innerHTML=
"✅ Player Found!\n\n"+
"👤 Nickname: Player_"+uid.slice(-4)+"\n"+
"🪪 UID: "+uid+"\n"+
"⭐ Level: "+randomLevel+"\n"+
"👍 Total Likes: "+randomLikes+"\n\n"+
"🖥️ Demo Version (Safe UI Only)";
}
</script>

</body>
</html>
