<!-- 🔥 Free Fire Like Sender (Blogger Compatible) -->

<!-- HTML -->
<div class="like-container">
  <h2>🔥 Free Fire Like Sender</h2>
  <label for="uid">🎮 Enter UID:</label>
  <input type="text" id="uid" placeholder="Uid: 123456789" />
  <label for="region">🌍 Select Region:</label>
  <select id="region">
    <option value="bd">🇧🇩 Bangladesh</option>
    <option value="ind">🇮🇳 India</option>
    <option value="br">🇧🇷 Brazil</option>
  </select>
  <button id="sendBtn">🚀 Send Like</button>
  <div id="result" class="result"></div>

  <!-- 🔹 Social Links -->
  <div class="social-links">
    <a href="https://t.me/teetaroo_bot" target="_blank">📢 Join Telegram</a>
    <a href="https://youtube.com/@voolpe_dsd" target="_blank">▶️ Subscribe YouTube</a>
  </div>
</div>

<!-- CSS -->
<style>
.like-container {
  background: #302C2C;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
  margin: 20px auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  color: #333;
  font-family: "Segoe UI", sans-serif;
}
.like-container h2 {
  color: #F3F2F2;
  margin-bottom: 15px;
  font-weight: 600;
  text-align: center;
}
.like-container input,
.like-container select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  background: #fafafa;
  color: #333;
}
.like-container button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  transition: transform .2s, box-shadow .2s;
}
.like-container button:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}
.like-container button:disabled {
  background: #bbb;
  cursor: not-allowed;
}
.result {
  margin-top: 15px;
  padding: 12px;
  border-radius: 8px;
  font-weight: 500;
  display: none;
  text-align: left;
  background: #f1f1f1;
  border: 1px solid #ddd;
  color: #333;
  white-space: pre-line;
}
.result.error { 
  background: #ffe5e5;
  border: 1px solid #ffaaaa;
  color: #b00020;
}
.social-links {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 12px;
}
.social-links a {
  flex: 1;
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  font-weight: 600;
  text-decoration: none;
  color: #fff;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  transition: transform .2s, box-shadow .2s;
}
.social-links a:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}
</style>

<script>
async function verifySite() {
  try {
    const res = await fetch("https://blogger-cheak2.vercel.app/api/check", {
      headers: { "x-site-token": "Panzer@320" }
    });
    const data = await res.json();
    console.log("Verification:", data);

    // শুধু console-এ লগ করবে
    if (data.valid) {
      console.log("✅ Authorized Website");
    } else {
      console.warn("❌ Unauthorized:", data.error || "Unknown error");
    }
  } catch(e) {
    console.error("🚨 Failed to fetch:", e.message);
  }
}
verifySite();
</script>
