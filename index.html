<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Drive Videos</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0}
header{background:#020617;padding:15px;display:flex;justify-content:space-between}
button{padding:8px 15px;border:none;border-radius:6px;cursor:pointer}
.logout{background:red;color:white}
.container{padding:20px}
.video-box{margin-bottom:30px;background:#1e293b;padding:15px;border-radius:12px}
iframe{width:100%;height:220px;border-radius:10px}
.login-box{max-width:350px;margin:100px auto}
input{width:100%;padding:10px;margin:10px 0}
</style>
</head>

<body>

<div id="loginPage" class="login-box">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error" style="color:red;display:none;">Login Failed</p>
</div>

<div id="homePage" style="display:none;">
<header>
<h3>🎬 Google Drive Videos</h3>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="video-box">
<h4>Video 1</h4>
<iframe src="https://drive.google.com/file/d/1O9FQ9_5ydw-BkrN06IGYepsCvlY07DrX/preview" allow="autoplay"></iframe>
</div>

<div class="video-box">
<h4>Video 2</h4>
<iframe src="https://drive.google.com/file/d/1Oi3BExPSEhd3TOHAmCOQ4z4Uu0dvAjq/preview" allow="autoplay"></iframe>
</div>

</div>
</div>

<script>
const USERNAME="admin";
const PASSWORD="12345";

function login(){
    let u=document.getElementById("username").value;
    let p=document.getElementById("password").value;

    if(u===USERNAME && p===PASSWORD){
        localStorage.setItem("loggedIn","true");
        showHome();
    }else{
        document.getElementById("error").style.display="block";
    }
}

function logout(){
    localStorage.removeItem("loggedIn");
    location.reload();
}

function showHome(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("homePage").style.display="block";
}

if(localStorage.getItem("loggedIn")==="true"){
    showHome();
}
</script>

</body>
</html>
